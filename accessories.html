<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accessories – Nordé Studio</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Hopp til innhold</a>

    <header class="site-header" id="top">
      <div class="container header-inner">
        <a class="logo" href="index.html" aria-label="Nordé Studio hjem">Nordé Studio</a>
        <nav class="nav" aria-label="Hovedmeny">
          <a href="index.html#categories">Trending</a>
          <a href="index.html#shop">Shop</a>
          <a href="index.html#about">About</a>
          <a class="nav-bag" href="bag.html">
            Bag <span class="bag-count" data-bag-count>0</span>
          </a>
          <a class="nav-cta" href="index.html#shop">Shop now</a>
        </nav>
      </div>
    </header>

    <main id="main">
      <section class="section accessories-hero" aria-label="Accessories hero">
        <div class="container">
          <div class="section-head accessories-head">
            <p class="eyebrow">Norde details</p>
            <h2>Accessories</h2>
            <p>Minimal details: , jewelry and more comming soon.</p>
          </div>

          <div class="accessories-tags" aria-label="Popular tags">
            <span>Jewelry</span>
            <span>Bags</span>
            <span>Belts</span>
            <span>Watches</span>
          </div>
        </div>
      </section>

      <section class="section accessories-grid" aria-label="Accessories products">
        <div class="container">
          <div class="products">
            <article class="product">
              <a class="product-media" href="product.html?id=mini-shoulder-bag" aria-label="View accessory one">
                <img src="acc/10 Pieces of Jewelry You Should Own By Age 30.jpg" alt="Accessory item 1" loading="lazy" />
              </a>
              <div class="product-meta">
                <h3 class="product-title">Van Cleef</h3>
                <p class="product-price">3799 NOK</p>
              </div>
            </article>

            <article class="product">
              <a class="product-media" href="product.html?id=gold-hoop-earrings" aria-label="View accessory two">
                <img src="acc/neckjpg.jpg" alt="Accessory item 2" loading="lazy" />
              </a>
              <div class="product-meta">
                <h3 class="product-title">Armani</h3>
                <p class="product-price">5249 NOK</p>
              </div>
            </article>

            <article class="product">
              <a class="product-media" href="product.html?id=leather-belt" aria-label="View accessory three">
                <img src="acc/rings.jpg" alt="Accessory item 3" loading="lazy" />
              </a>
              <div class="product-meta">
                <h3 class="product-title">Armani</h3>
                <p class="product-price">5399 NOK</p>
              </div>
            </article>

            <article class="product">
              <a class="product-media" href="product.html?id=soft-scarf" aria-label="View accessory four">
                <img src="acc/clock.jpg" alt="Accessory item 4" loading="lazy" />
              </a>
              <div class="product-meta">
                <h3 class="product-title">Van Cleef</h3>
                <p class="product-price">5299 NOK</p>
              </div>
            </article>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer" aria-label="Footer">
      <div class="container footer-bottom">
        <p class="muted">© 2026 Nordé Studio</p>
      </div>
    </footer>

    <script>
      const header = document.querySelector(".site-header");
      const onScroll = () => header.classList.toggle("is-scrolled", window.scrollY > 10);
      window.addEventListener("scroll", onScroll, { passive: true });
      onScroll();

      function getBag() {
        try {
          return JSON.parse(localStorage.getItem("norde_bag") || "[]");
        } catch {
          return [];
        }
      }
      function bagItemCount(items) {
        return items.reduce((sum, item) => sum + (item.qty || 1), 0);
      }
      function updateBagCount() {
        const count = bagItemCount(getBag());
        document.querySelectorAll("[data-bag-count]").forEach((el) => {
          el.textContent = String(count);
        });
      }
      updateBagCount();
    </script>
  </body>
</html>
